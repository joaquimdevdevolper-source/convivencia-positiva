<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Convivência Positiva</title>
<style>
  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?auto=format&fit=crop&w=1470&q=80') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(8px);
    background: rgba(0,0,0,0.3);
    z-index: 0;
  }

  .background-text {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    font-size: 48px;
    font-weight: 900;
    color: rgba(255, 255, 255, 0.15);
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
    text-transform: uppercase;
    z-index: 1;
  }

  .navbar {
    position: relative;
    z-index: 1;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 30px;
  }

  .navbar button {
    padding: 10px 18px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg,#ff8a00,#e52e71);
    color: white;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
  }

  .navbar button:hover { transform: scale(1.05); }

  .card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.1);
    padding: 40px 30px;
    border-radius: 20px;
    box-shadow: 0 0 20px rgba(0,0,0,0.4);
    width: 350px;
    text-align: center;
    color: white;
  }

  .card h1 { font-size: 22px; margin-bottom: 20px; font-weight: 700; text-shadow: 0 0 10px #000; }
  .card p { font-size: 16px; margin-bottom: 20px; }
  .card button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg,#00c6ff,#0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }
  .card button:hover { transform: scale(1.05); }

  @media(max-width: 400px){
    .card { width: 90%; padding: 30px 20px; }
    .background-text { font-size: 32px; }
    .navbar { flex-direction: column; gap: 10px; }
  }
</style>
</head>
<body>

<div class="background-text">Joaquim melhor dev da EEep</div>

<div class="navbar">
  <button onclick="alert('Sobre a Convivência Escolar Positiva')">Sobre</button>
  <button onclick="alert('Barras de progresso / Informações')">Barras</button>
  <button onclick="alert('Mais informações em breve')">Informações</button>
</div>

<div class="card">
  <h1>Convivência Positiva</h1>
  <p>O site ainda está em desenvolvimento. Aqui vamos construir um espaço de aprendizado e interação para todos!</p>
  <button onclick="alert('Botão 1 clicado')">Botão 1</button>
  <button onclick="alert('Botão 2 clicado')">Botão 2</button>
  <button onclick="alert('Botão 3 clicado')">Botão 3</button>
</div>

</body>
</html>
