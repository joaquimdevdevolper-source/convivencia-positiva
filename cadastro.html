<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cadastro - Convivência Positiva</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
  body, html { height:100%; background: linear-gradient(135deg,#6a11cb,#2575fc); color:#fff; display:flex; justify-content:center; align-items:center; }
  .background-text { position: fixed; top:50%; left:50%; transform: translate(-50%,-50%); font-size:4vw; font-weight:bold; color:rgba(255,255,255,0.1); pointer-events:none; z-index:0; }
  .card { position:relative; z-index:1; max-width:400px; width:90%; padding:40px 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius:15px; text-align:center; }
  h1 { font-size:2rem; margin-bottom:20px; text-shadow:2px 2px 10px rgba(0,0,0,0.3); }
  input { width:80%; padding:10px; margin:10px 0; border-radius:10px; border:none; outline:none; font-size:1rem; }
  .senha-container { position: relative; display: inline-block; width: 80%; }
  .senha-container input { width:100%; padding-right:40px; }
  .toggle-senha { position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:1.2rem; color:#fff; user-select:none; }
  button { width:85%; padding:12px; border:none; border-radius:10px; background:#80ff80; font-weight:bold; cursor:pointer; font-size:1rem; transition:0.3s; margin-top:10px; }
  button:hover { background:#5cd65c; }
  .message { margin-top:10px; font-size:1rem; }
</style>
</head>
<body>

<div class="background-text">Joaquim o melhor dev</div>

<div class="card">
  <h1>Cadastro de Aluno</h1>

  <input type="text" id="nome" placeholder="Nome completo">
  <input type="number" id="idade" placeholder="Idade">
  <input type="text" id="turma" placeholder="Turma">
  <input type="text" id="login" placeholder="Login">

  <div class="senha-container">
    <input type="password" id="senha" placeholder="Senha">
    <span class="toggle-senha" onclick="toggleSenha()">👁️</span>
  </div>

  <button onclick="fazerCadastro()">Cadastrar</button>
  <button onclick="voltarLogin()">Voltar para Login</button>

  <div class="message" id="msg"></div>
</div>

<script>
function toggleSenha(){
  const senha = document.getElementById('senha');
  senha.type = senha.type === 'password' ? 'text' : 'password';
}

function voltarLogin(){
  window.location.href = 'index.html';
}

async function fazerCadastro(){
  const nome = document.getElementById('nome').value.trim();
  const idade = document.getElementById('idade').value.trim();
  const turma = document.getElementById('turma').value.trim();
  const login = document.getElementById('login').value.trim();
  const senha = document.getElementById('senha').value.trim();
  const msg = document.getElementById('msg');

  if(!nome || !idade || !turma || !login || !senha){
    msg.innerText = "Preencha todos os campos!";
    msg.style.color="#ff8080";
    return;
  }

  try{
    const res = await fetch('/cadastro', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ nome, idade, turma, login, senha })
    });
    const data = await res.json();
    if(data.ok){
      msg.style.color="#80ff80";
      msg.innerText = data.msg; // mostra a matrícula gerada
      setTimeout(()=>window.location.href='index.html',1000);
    } else {
      msg.style.color="#ff8080";
      msg.innerText = data.erro;
    }
  } catch(err){
    msg.style.color="#ff8080";
    msg.innerText = "Erro no servidor";
  }
}
</script>

</body>
</html>
